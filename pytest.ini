[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
markers =
    slow: marks tests that take more than ~1s (deselect with -m "not slow")
    live: tests that hit real external APIs (Azure OpenAI, Pinecone). Gated on env vars; opt-in with `pytest -m live`.
